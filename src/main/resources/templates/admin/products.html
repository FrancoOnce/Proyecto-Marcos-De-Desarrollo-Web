<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Menú | Panel Administrativo Happy Chicken</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/admin/admin.css}">
</head>

<body class="bg-light">

    <div class="admin-dashboard">

        <aside class="admin-sidebar shadow-lg" id="adminSidebar">
            <div class="d-flex justify-content-end d-lg-none p-2">
                <button class="btn btn-link text-white text-decoration-none" id="closeSidebar">
                    <i class="bi bi-x-lg fs-4"></i>
                </button>
            </div>

            <div class="sidebar-header text-center">
                <img src="" alt="Happy Chicken Logo" class="sidebar-logo bg-white rounded-circle p-1 mb-2">
                <h2 class="font-orbitron text-danger fw-bold fs-5">Admin Panel</h2>
            </div>

            <nav class="admin-nav">
                <a th:href="@{/admin/dashboard}"><i class="bi bi-house-door me-2"></i> Dashboard</a>
                <a th:href="@{/admin/productos}" class="active"><i class="bi bi-card-list me-2"></i> Menú</a>
                <a th:href="@{/admin/orders}"><i class="bi bi-receipt me-2"></i> Pedidos</a>
                <a href="#"><i class="bi bi-people me-2"></i> Clientes (Pronto)</a>

                <div class="nav-divider my-3 border-top border-secondary opacity-25"></div>

                <a th:href="@{/index}" class="text-secondary"><i class="bi bi-box-arrow-up-right me-2"></i> Ver
                    Tienda</a>
                <a th:href="@{/admin/login}" id="logoutBtn" class="text-danger mt-3"><i class="bi bi-box-arrow-left me-2"></i>
                    Cerrar Sesión</a>
            </nav>
        </aside>

        <div class="admin-main-wrapper">

            <div class="d-lg-none bg-dark text-white p-3 d-flex align-items-center shadow-sm sticky-top">
                <button class="btn btn-dark border-0 me-3 p-1" id="openSidebar">
                    <i class="bi bi-list fs-1"></i>
                </button>
                <img src="" alt="Logo" width="35" height="35" class="bg-white rounded-circle p-1 me-2">
                <h2 class="font-orbitron text-danger m-0 fs-5 fw-bold">Admin</h2>
            </div>

            <main class="admin-content">

                <div
                    class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
                    <h1 class="page-title font-orbitron m-0">Gestión de Productos</h1>

                    <button class="btn btn-danger btn-lg fw-bold shadow-sm w-100 w-md-auto" data-bs-toggle="collapse"
                        data-bs-target="#productFormContainer">
                        <i class="bi bi-plus-circle me-2"></i> Añadir Nuevo Producto
                    </button>
                </div>

                <div class="collapse mb-5" id="productFormContainer">
                    <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
                        <h3 class="font-orbitron fw-bold mb-4 border-bottom pb-3">Registrar / Editar Plato</h3>

                        <form id="addProductForm">
                            <div class="row g-4">
                                <input type="hidden" id="productId">
                                <div class="col-md-8">
                                    <label for="productName" class="form-label fw-bold text-secondary">Nombre del
                                        Plato:</label>
                                    <input type="text" id="productName" class="form-control bg-light py-2"
                                        placeholder="Ej: Alitas BBQ" required>
                                </div>

                                <div class="col-md-4">
                                    <label for="productPrice" class="form-label fw-bold text-secondary">Precio
                                        (S/):</label>
                                    <input type="number" id="productPrice" class="form-control bg-light py-2"
                                        step="0.10" placeholder="0.00" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="productCategory"
                                        class="form-label fw-bold text-secondary">Categoría:</label>
                                    <select id="productCategory" class="form-select bg-light py-2" required>
                                        <option value="" selected disabled>Seleccionar categoría...</option>
                                        <option value="1">Combos & Especiales</option>
                                        <option value="2">Pollo a la Brasa</option>
                                        <option value="3">Bebidas</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label for="productStatus" class="form-label fw-bold text-secondary">Estado:</label>
                                    <select id="productStatus" class="form-select bg-light py-2" required>
                                        <option value="active" selected>Disponible</option>
                                        <option value="inactive">Agotado</option>
                                    </select>
                                </div>

                                <div class="col-md-12">
                                    <label for="productImage" class="form-label fw-bold text-secondary">URL de Imagen
                                        del Plato:</label>
                                    <input type="text" id="productImage" class="form-control bg-light py-2"
                                        placeholder="Ej: ../static/img/mounstrito.jpg o https://..." required>
                                    <div class="form-text mt-2">Puedes usar una imagen local (desde img) o pegar una URL
                                        directamente.</div>
                                </div>

                                <div class="col-md-12">
                                    <label for="productDescription"
                                        class="form-label fw-bold text-secondary">Descripción (Opcional):</label>
                                    <textarea id="productDescription" class="form-control bg-light py-2" rows="3"
                                        placeholder="Ingredientes o detalles del plato..."></textarea>
                                </div>
                            </div>

                            <div class="d-flex gap-3 mt-4 pt-3 border-top">
                                <button type="submit" class="btn btn-danger fw-bold px-4 py-2">Guardar Producto</button>
                                <button type="button" class="btn btn-light border px-4 py-2" data-bs-toggle="collapse"
                                    data-bs-target="#productFormContainer">Cancelar</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="table-container shadow-sm bg-white rounded-4 p-4">
                    <div class="table-responsive">
                        <table class="admin-table w-100">
                            <thead>
                                <tr>
                                    <th>Foto</th>
                                    <th>Nombre del Plato</th>
                                    <th>Categoría</th>
                                    <th>Precio</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="productsTableBody">
                                <!-- Los productos se cargaran dinamicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        document.getElementById('openSidebar').addEventListener('click', function () {
            document.getElementById('adminSidebar').classList.add('show');
        });
        document.getElementById('closeSidebar').addEventListener('click', function () {
            document.getElementById('adminSidebar').classList.remove('show');
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/admin/products.js}"></script>
</body>

</html>
